<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pacientes</title>

    <link rel="stylesheet"
          href="./css/style.css">

</head>

<body>

    <header class="app-header">
        <div class="app-header-inner">

            <div class="app-title">
<h1>MediClick</h1>
                <p>tu salud, tu tiempo, nuestra prioridad</p>
            </div>
        </div>
    </header>

    <div class="container">

        <div class="card">

            <h1>Pacientes</h1>

            <!-- FORMULARIO -->

            <form id="formPaciente">

                <div class="grid-form">

                    <label for="nombre">Nombre</label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Nombre"
                        required
                    >

                    <label for="documento">Documento</label>
                    <input
                        type="text"
                        id="documento"
                        name="documento"
                        placeholder="Documento"
                        required
                    >

                    <label for="telefono">Teléfono</label>
                    <input
                        type="text"
                        id="telefono"
                        name="telefono"
                        placeholder="Teléfono"
                    >

                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Email"
                    >

                    <label for="fecha_nacimiento">Fecha de nacimiento</label>
                    <input
                        type="date"
                        id="fecha_nacimiento"
                        name="fecha_nacimiento"
                    >

                </div>

                <label for="direccion">Dirección</label>
                <textarea
                    id="direccion"
                    name="direccion"
                    placeholder="Dirección"
                ></textarea>

                <button type="submit">

                    Guardar paciente

                </button>

            </form>

        </div>

        <!-- TABLA -->

        <div class="card">

            <h2>Listado pacientes</h2>

            <table class="tabla">

                <thead>

                    <tr>

                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaPacientes">

                </tbody>

            </table>

        </div>

    </div>

    <script type="module" src="./js/pacientes.js"></script>

    <footer class="footer">
    © <span id="year"></span> MediClick. Todos los derechos reservados.
  </footer>

    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>

</html>
