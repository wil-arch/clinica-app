<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Citas</title>

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <header class="app-header">
        <div class="app-header-inner">

            <div class="app-title">
<h1>MediClick</h1>
                <p>tu salud, tu tiempo, nuestra prioridad</p>
            </div>
        </div>
    </header>

    <div class="container">

        <div class="card">

            <h1>Agendar cita</h1>

            <form id="formCita">

                <div class="grid-form">

                    <!-- PACIENTES -->

                    <label for="selectPacientes">Paciente</label>
                    <select
                        name="paciente_id"
                        id="selectPacientes"
                        required
                    >

                        <option value="">

                            Seleccionar paciente

                        </option>

                    </select>

                    <!-- MEDICOS -->

                    <label for="selectMedicos">Médico</label>
                    <select
                        name="medico_id"
                        id="selectMedicos"
                        required
                    >

                        <option value="">

                            Seleccionar médico

                        </option>

                    </select>

                    <label for="fecha">Fecha</label>
                    <input
                        id="fecha"
                        type="date"
                        name="fecha"
                        required
                    >

                    <label for="hora">Hora</label>
                    <input
                        id="hora"
                        type="time"
                        name="hora"
                        required
                    >

                    <label for="estado">Estado</label>
                    <select name="estado" id="estado">

                        <option value="pendiente">

                            Pendiente

                        </option>

                        <option value="confirmada">

                            Confirmada

                        </option>

                        <option value="cancelada">

                            Cancelada

                        </option>

                        <option value="finalizada">

                            Finalizada

                        </option>

                    </select>

                </div>

                <textarea
                    name="motivo"
                    placeholder="Motivo consulta"
                ></textarea>

                <button type="submit">

                    Agendar cita

                </button>

            </form>

        </div>

        <!-- TABLA -->

        <div class="card">

            <h2>Listado citas</h2>

            <table class="tabla">

                <thead>

                    <tr>

                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Especialidad</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Estado</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaCitas">

                </tbody>

            </table>

        </div>

    </div>

    
<script src="js/citas.js" type="module"></script>

   <footer class="footer">
    © <span id="year"></span> MediClick. Todos los derechos reservados.
  </footer>

    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>

</html>
