<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

<body>

  <header class="app-header">
    <div class="app-header-inner">
        <div class="app-title">
            <a href="/" class="logo-link">
                <h1>MediClick</h1>
                <p>tu salud, tu tiempo, nuestra prioridad</p>
            </a>
        </div>
    </div>
</header>

  <div class="container">
    <form id="formRegistro" class="card">
      <h1>Crear cuenta</h1>

      <div class="input-group">
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" name="nombre" required placeholder="Nombre" />
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required placeholder="Correo electrónico" />
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" name="password" required placeholder="Contraseña" />
      </div>

      <div class="input-group">
        <label for="rol">Rol</label>
        <select id="rol" name="rol">
          <option value="consulta">Consulta</option>
          <option value="recepcionista">Recepcionista</option>
          <option value="medico">Médico</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <!-- Campos extra para médicos -->
      <div class="input-group medico-only" data-rol="medico">
        <label for="especialidad">Especialidad</label>
        <select id="especialidad" name="especialidad">
          <option value="">Seleccione especialidad</option>
          <option value="Cardiología">Cardiología</option>
          <option value="Dermatología">Dermatología</option>
          <option value="Endocrinología">Endocrinología</option>
          <option value="Gastroenterología">Gastroenterología</option>
          <option value="Ginecología">Ginecología</option>
          <option value="Medicina General">Medicina General</option>
          <option value="Medicina Interna">Medicina Interna</option>
          <option value="Nefrología">Nefrología</option>
          <option value="Neurología">Neurología</option>
          <option value="Oftalmología">Oftalmología</option>
          <option value="Oncología">Oncología</option>
          <option value="Ortopedia">Ortopedia</option>
          <option value="Otorrinolaringología">Otorrinolaringología</option>
          <option value="Pediatría">Pediatría</option>
          <option value="Psiquiatría">Psiquiatría</option>
          <option value="Radiología">Radiología</option>
          <option value="Reumatología">Reumatología</option>
          <option value="Urología">Urología</option>
        </select>
      </div>

      <div class="input-group medico-only" data-rol="medico">
        <label for="telefono">Teléfono</label>
        <input id="telefono" type="text" name="telefono" placeholder="Ej: 555-1234" />
      </div>

      <div class="input-group medico-only" data-rol="medico">
        <label for="consultorio">Consultorio</label>
        <input id="consultorio" type="text" name="consultorio" placeholder="Ej: 2B" />
      </div>

      <div class="input-group">
        <label for="foto">Foto perfil</label>
        <input id="foto" type="file" name="foto" accept="image/jpg" />
      </div>

      <!-- Campos extra para pacientes (consulta) -->
     <div class="input-group consulta-only">
       <label for="documento">Número de documento</label>
       <input id="documento" type="text" name="documento" placeholder="Ej: 1234567890" />
     </div>

     <div class="input-group consulta-only">
       <label for="telefono_paciente">Teléfono</label>
       <input id="telefono_paciente" type="text" name="telefono" placeholder="Ej: 3001234567" />
     </div>

     <div class="input-group consulta-only">
       <label for="direccion">Dirección</label>
       <input id="direccion" type="text" name="direccion" placeholder="Ej: Calle 10 # 5-23" />
     </div>

     <div class="input-group consulta-only">
      <label for="fecha_nacimiento">Fecha de nacimiento</label>
      <input id="fecha_nacimiento" type="date" name="fecha_nacimiento" />
     </div>

      <button type="submit">Registrarse</button>

      <p class="link-auth">
    <a href="/">← Volver al inicio</a>
</p>
<p class="link-auth">
    ¿Ya tienes cuenta?
    <a href="./login.html">Iniciar sesión</a>
</p>
    </form>
  </div>


  <script type="module" src="./js/registro.js"></script>

 <footer class="footer">
    © <span id="year"></span> MediClick. Todos los derechos reservados.
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
