<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Médicos</title>

    <link rel="stylesheet"
          href="./css/style.css">
   
</head>

<body>

    <header class="app-header">
        <div class="app-header-inner">

            <div class="app-title">
<h1>MediClick</h1>
                <p>tu salud, tu tiempo, nuestra prioridad</p>
            </div>
        </div>
    </header>

    <div class="container">

        <div class="card">

            <h1>Médicos</h1>

            <form id="formMedico">

                <div class="grid-form">

                    <input
                        type="text"
                        name="nombre"
                        placeholder="Nombre"
                        required
                    >

                    <input
                        type="text"
                        name="especialidad"
                        placeholder="Especialidad"
                        required
                    >

                    <input
                        type="text"
                        name="telefono"
                        placeholder="Teléfono"
                    >

                    <input
                        type="email"
                        name="email"
                        placeholder="Email"
                    >

                    <input
                        type="text"
                        name="consultorio"
                        placeholder="Consultorio"
                    >

                </div>

                <button type="submit">

                    Guardar médico

                </button>

            </form>

        </div>

        <!-- TABLA -->

        <div class="card">

            <h2>Listado médicos</h2>

            <table class="tabla">

                <thead>

                    <tr>

                        <th>Nombre</th>
                        <th>Especialidad</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Consultorio</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaMedicos">

                </tbody>

            </table>

        </div>

    </div>

   <!-- =============================
     MODAL VER MÉDICO
============================= -->
<div id="modal-medico" class="modal-overlay">

    <div class="modal-contenido">

        <button class="modal-cerrar" onclick="cerrarModalMedico()">✕</button>

        <h2 class="modal-titulo">Detalle del médico</h2>

        <div class="modal-campos">

            <div class="modal-campo">
                <p class="modal-label">Nombre</p>
                <p id="modal-nombre" class="modal-valor"></p>
            </div>

            <div class="modal-campo">
                <p class="modal-label">Especialidad</p>
                <p id="modal-especialidad" class="modal-valor"></p>
            </div>

            <div class="modal-campo">
                <p class="modal-label">Teléfono</p>
                <p id="modal-telefono" class="modal-valor"></p>
            </div>

            <div class="modal-campo">
                <p class="modal-label">Email</p>
                <p id="modal-email" class="modal-valor"></p>
            </div>

            <div class="modal-campo">
                <p class="modal-label">Consultorio</p>
                <p id="modal-consultorio" class="modal-valor"></p>
            </div>

        </div>

        <div class="modal-acciones">
            <button class="btn-cancelar" onclick="cerrarModalMedico()">Cerrar</button>
            <button id="modal-btn-editar" class="btn-guardar">Editar</button>
        </div>

    </div>

</div>


    <script src="./js/medicos.js"></script>

    <footer class="app-footer">
        <div class="app-footer-inner">
            <div class="footer-left">© <span id="year"></span> interiza. Todos los derechos reservados.</div>
            <div class="footer-social">
                <a href="https://www.facebook.com" target="_blank" rel="noreferrer noopener" aria-label="Facebook" title="Facebook">
                    <svg viewBox="0 0 24 24" role="img"><path d="M22 12a10 10 0 1 0-11.5 9.9v-7h-2.2V12h2.2V9.8c0-2.2 1.3-3.4 3.3-3.4.9 0 1.9.2 1.9.2v2.1h-1.1c-1.1 0-1.5.7-1.5 1.4V12h2.5l-.4 2.9h-2.1v7A10 10 0 0 0 22 12z"/></svg>
                </a>
                <a href="https://www.instagram.com" target="_blank" rel="noreferrer noopener" aria-label="Instagram" title="Instagram">
                    <svg viewBox="0 0 24 24" role="img"><path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 2a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h10zm-5 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm5.5-2.2a1.1 1.1 0 1 1-2.2 0 1.1 1.1 0 0 1 2.2 0z"/></svg>
                </a>
                <a href="https://twitter.com" target="_blank" rel="noreferrer noopener" aria-label="Twitter" title="Twitter">
                    <svg viewBox="0 0 24 24" role="img"><path d="M22 5.8c-.7.3-1.4.6-2.2.7.8-.5 1.4-1.2 1.7-2.1-.8.5-1.6.8-2.5 1A3.6 3.6 0 0 0 12.9 8c0 .3 0 .6.1.9-3-.1-5.7-1.6-7.5-4-.3.6-.5 1.2-.5 2 0 1.3.7 2.4 1.7 3.1-.6 0-1.2-.2-1.7-.5v.1c0 1.8 1.3 3.3 3 3.6-.3.1-.7.1-1.1.1-.2 0-.5 0-.7-.1.5 1.6 2 2.8 3.8 2.8A7.3 7.3 0 0 1 2 18.6 10.3 10.3 0 0 0 7.6 20c6.7 0 10.4-5.7 10.4-10.6v-.5c.7-.5 1.3-1.1 1.8-1.8z"/></svg>
                </a>
            </div>
        </div>
    </footer>

    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>

</html>
