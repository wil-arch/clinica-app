<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Médicos</title>

    <link rel="stylesheet"
          href="./css/style.css">
   
</head>

<body>

    <header class="app-header">
        <div class="app-header-inner">

            <div class="app-title">
<h1>MediClick</h1>
                <p>tu salud, tu tiempo, nuestra prioridad</p>
            </div>
        </div>
    </header>

    <div class="container">

        <div class="card">

            <h1>Médicos</h1>

            <form id="formMedico">

                <div class="grid-form">

                    <input
                        type="text"
                        name="nombre"
                        placeholder="Nombre"
                        required
                    >

                    <input
                        type="text"
                        name="especialidad"
                        placeholder="Especialidad"
                        required
                    >

                    <input
                        type="text"
                        name="telefono"
                        placeholder="Teléfono"
                    >

                    <input
                        type="email"
                        name="email"
                        placeholder="Email"
                    >

                    <input
                        type="text"
                        name="consultorio"
                        placeholder="Consultorio"
                    >

                </div>

                <button type="submit">

                    Guardar médico

                </button>

            </form>

        </div>

        <!-- TABLA -->

        <div class="card">

            <h2>Listado médicos</h2>

            <table class="tabla">

                <thead>

                    <tr>

                        <th>Nombre</th>
                        <th>Especialidad</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Consultorio</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaMedicos">

                </tbody>

            </table>

        </div>

    </div>

   <!-- =============================
     MODAL VER MÉDICO
============================= -->
<div id="modal-medico" class="modal-overlay">

    <div class="modal-contenido">

        <button class="modal-cerrar" onclick="cerrarModalMedico()">✕</button>

        <h2 class="modal-titulo">Detalle del médico</h2>

        <div class="modal-campos">

            <div class="modal-campo">
                <p class="modal-label">Nombre</p>
                <p id="modal-nombre" class="modal-valor"></p>
            </div>

            <div class="modal-campo">
                <p class="modal-label">Especialidad</p>
                <p id="modal-especialidad" class="modal-valor"></p>
            </div>

            <div class="modal-campo">
                <p class="modal-label">Teléfono</p>
                <p id="modal-telefono" class="modal-valor"></p>
            </div>

            <div class="modal-campo">
                <p class="modal-label">Email</p>
                <p id="modal-email" class="modal-valor"></p>
            </div>

            <div class="modal-campo">
                <p class="modal-label">Consultorio</p>
                <p id="modal-consultorio" class="modal-valor"></p>
            </div>

        </div>

        <div class="modal-acciones">
            <button class="btn-cancelar" onclick="cerrarModalMedico()">Cerrar</button>
            <button id="modal-btn-editar" class="btn-guardar">Editar</button>
        </div>

    </div>

</div>


    <script src="./js/medicos.js"></script>

    <footer class="footer">
    © <span id="year"></span> MediClick. Todos los derechos reservados.
  </footer>

    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>

</html>
